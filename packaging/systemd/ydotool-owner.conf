[Service]
# Socket perm 0666 so any local user can drive ydotoold without requiring
# us to know which UID installed the package. On a single-user desktop this
# is equivalent to the existing key-input trust boundary (anyone with a
# terminal on your machine can already type at your keyboard).
ExecStart=
ExecStart=/usr/bin/ydotoold --socket-perm=0666
